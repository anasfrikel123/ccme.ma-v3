name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-build-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Unit tests (tax, schema, content drift, cabinet)
        run: npm test

      - name: Verify images + strict meta
        run: npm run verify

      - name: Production build + link crawl + dist contracts
        run: npm run build

      - name: E2E smoke + a11y (Playwright)
        run: npm run test:e2e

      - name: Lighthouse mobile budget (home)
        run: npm run test:perf
